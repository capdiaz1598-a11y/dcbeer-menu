<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DC BEER</title>
<link href="https://fonts.googleapis.com/css2?family=Lobster&family=Oswald:wght@300;400;600;700&family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Bebas+Neue&family=Anton&family=Poppins:wght@300;400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a0e07;--card:#251508;--top:#110906;--border:rgba(255,255,255,.07);--cream:#ede0c4;--muted:#7a9aaa;--gold:#c8aa6a;--txt:#b8d0e0;--font-body:'Oswald';--font-brand:'Lobster';--hero-size:62px;--subtitle-scale:1;--desc-scale:1}
body{background:var(--bg);color:var(--cream);font-family:var(--font-body),sans-serif;max-width:480px;margin:0 auto;padding-bottom:58px}
.hdr{background:var(--top);padding:13px 18px;text-align:center;position:sticky;top:0;z-index:99;border-bottom:1px solid rgba(255,255,255,.05)}
.brand{font-family:var(--font-brand),cursive;font-size:28px;color:var(--gold);cursor:pointer;user-select:none}
.brand-sub{font-size:calc(8px * var(--subtitle-scale));letter-spacing:4px;color:var(--muted);margin-top:2px;text-transform:uppercase;font-weight:300}
.loading{text-align:center;padding:60px 20px;font-size:13px;color:var(--muted);letter-spacing:2px}
.loading-spin{width:32px;height:32px;border:3px solid rgba(200,170,106,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.sec{display:none}.sec.on{display:block}
.hero{position:relative;height:300px;overflow:hidden}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center 30%;filter:brightness(.55);display:block}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(26,14,7,.6) 60%,rgba(26,14,7,1) 100%);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:28px;text-align:center}
.htitle{font-size:var(--hero-size);font-weight:700;letter-spacing:6px;color:var(--cream);text-transform:uppercase;line-height:1}
.hsub{font-size:calc(12px * var(--subtitle-scale));font-weight:300;color:rgba(237,224,196,.5);margin-top:10px;max-width:260px;line-height:1.6;font-family:sans-serif}
.cards{padding:16px 14px 8px}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;position:relative;transition:opacity .3s,border-color .35s ease,box-shadow .35s ease;cursor:pointer}
.pcard.exp{border-color:rgba(200,170,106,.45);box-shadow:0 0 0 1px rgba(200,170,106,.12)}
.pcard.off{opacity:.4}
.rib{position:absolute;top:0;right:0;width:88px;height:88px;overflow:hidden;z-index:5;pointer-events:none}
.rib-txt{position:absolute;top:22px;right:-22px;width:92px;text-align:center;font-size:9px;font-weight:700;letter-spacing:1px;padding:5px 0;transform:rotate(45deg);text-transform:uppercase}
.rib.av .rib-txt{background:var(--gold);color:#110906}
.rib.na .rib-txt{background:#555;color:#bbb}
.cbody{display:flex;min-height:168px}
.cimg{flex:0 0 132px;overflow:hidden;position:relative;background:#150b05}
.cimg img{width:100%;height:100%;object-fit:contain}
.cimg::after{content:"";position:absolute;inset:0;background:linear-gradient(to right,transparent 40%,var(--card) 100%)}
.cinfo{flex:1;padding:16px 14px 12px 10px}
.cname{font-size:18px;font-weight:700;color:var(--cream);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px;line-height:1.15}
.crow{font-size:calc(12px * var(--desc-scale));color:var(--txt);margin-bottom:3px;font-family:sans-serif}
.crow b{color:var(--cream);font-family:var(--font-body),sans-serif;font-weight:600}
.cprice-in{font-size:18px;font-weight:600;color:var(--cream);margin-top:9px;padding-right:36px}
.chev{position:absolute;right:14px;bottom:14px;width:28px;height:28px;border:1px solid rgba(255,255,255,.13);border-radius:50%;background:var(--card);cursor:pointer;color:var(--cream);display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:2}
.chev svg{width:13px;height:13px;transition:transform .35s cubic-bezier(.4,0,.2,1)}
.chev.open svg{transform:rotate(180deg)}
.chev.open{background:rgba(200,170,106,.18);border-color:var(--gold)}
.xpand{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1)}
.xpand.open{max-height:1200px}
.xpand-in{padding:14px 16px 18px;border-top:1px solid rgba(255,255,255,.05);font-family:sans-serif;opacity:0;transform:translateY(-6px);transition:opacity .35s ease .05s,transform .35s ease .05s}
.xpand.open .xpand-in{opacity:1;transform:translateY(0)}
.ct-desc{font-size:calc(12.5px * var(--desc-scale));color:var(--cream);line-height:1.7;margin-bottom:16px;font-family:sans-serif}
.ct-ttl{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid rgba(200,170,106,.22);font-family:var(--font-body),sans-serif}
.ct-lbl{font-size:calc(10.5px * var(--desc-scale));font-weight:700;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;margin-bottom:4px;font-family:var(--font-body),sans-serif}
.ct-val{font-size:calc(11.5px * var(--desc-scale));color:var(--muted);line-height:1.75;margin-bottom:0}
.ct-hr{border:none;border-top:1px solid rgba(255,255,255,.05);margin:11px 0}
.scard{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;display:flex;overflow:hidden;transition:opacity .3s}
.scard.off{opacity:.4}
.sicon{flex:0 0 88px;display:flex;align-items:center;justify-content:center;font-size:36px;background:#1e1008;overflow:hidden}
.sicon img{width:100%;height:100%;object-fit:cover}
.sinfo{flex:1;padding:12px 10px}
.sname{font-size:17px;font-weight:700;color:var(--cream);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.sdesc{font-size:calc(11px * var(--desc-scale));color:var(--muted);font-family:sans-serif;line-height:1.4}
.sprice{font-size:18px;font-weight:600;color:var(--cream);margin-top:8px}
.note{text-align:center;padding:12px 20px 22px;font-size:11px;color:var(--muted);font-weight:300;line-height:1.8;font-family:sans-serif}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--top);border-top:1px solid rgba(255,255,255,.07);display:flex;z-index:99}
.tbtn{flex:1;padding:13px 3px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--font-body),sans-serif}
.tbtn.on{color:var(--cream)}
.pin-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:300;align-items:center;justify-content:center}
.pin-wrap.on{display:flex}
.pin-box{background:#1e1008;border:1px solid rgba(200,170,106,.2);border-radius:14px;padding:28px 24px;text-align:center;width:270px}
.pin-title{font-size:15px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.pin-hint{font-size:11px;color:var(--muted);margin-bottom:20px;font-family:sans-serif}
.dots{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
.dot{width:13px;height:13px;border-radius:50%;border:2px solid rgba(200,170,106,.35)}
.dot.on{background:var(--gold);border-color:var(--gold)}
.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.key{background:#110906;border:1px solid rgba(255,255,255,.08);color:var(--cream);padding:15px;font-size:18px;font-weight:600;cursor:pointer;border-radius:9px;font-family:var(--font-body),sans-serif}
.key:active{background:#2a1810}
.pin-input{width:100%;background:#110906;border:1px solid rgba(255,255,255,.12);color:var(--cream);padding:13px 14px;font-size:16px;border-radius:9px;outline:none;text-align:center;letter-spacing:2px;font-family:var(--font-body),sans-serif;box-sizing:border-box}
.pin-err{font-size:11px;color:#e06060;margin-top:10px;min-height:15px;font-family:sans-serif}
.adm-wrap{display:none;position:fixed;inset:0;background:#0e0804;z-index:200;overflow-y:auto}
.adm-wrap.on{display:block}
.adm-top{background:#110906;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(200,170,106,.18);position:sticky;top:0;z-index:10}
.adm-title{font-size:16px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.adm-cls{background:none;border:1px solid rgba(200,170,106,.3);color:var(--gold);padding:6px 13px;font-size:11px;letter-spacing:2px;cursor:pointer;border-radius:4px;font-family:var(--font-body),sans-serif}
.adm-tabs{display:flex;background:#110906;border-bottom:1px solid rgba(255,255,255,.06)}
.atab{flex:1;padding:11px 2px;font-size:9.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--font-body),sans-serif}
.atab.on{color:var(--gold);border-bottom-color:var(--gold)}
.asec{display:none;padding:14px 12px}.asec.on{display:block}
.saving{text-align:center;padding:8px;font-size:11px;color:var(--gold);letter-spacing:2px;font-family:var(--font-body),sans-serif}
.aitem{background:#251508;border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:13px;margin-bottom:11px}
.aitem-top{display:flex;align-items:center;gap:11px;margin-bottom:10px}
.athumb{width:50px;height:50px;border-radius:8px;background:#1a0e07;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.athumb img{width:100%;height:100%;object-fit:cover}
.anm{font-size:14px;font-weight:700;color:var(--cream);text-transform:uppercase;letter-spacing:.5px}
.ast{font-size:11px;color:var(--muted);margin-top:2px;font-family:sans-serif}
.arow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tgl{position:relative;width:42px;height:22px;flex-shrink:0}
.tgl input{position:absolute;opacity:0;width:0;height:0}
.tgl-sl{position:absolute;inset:0;background:#333;border-radius:22px;cursor:pointer;transition:.3s}
.tgl-sl::before{content:"";position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.tgl input:checked+.tgl-sl{background:var(--gold)}
.tgl input:checked+.tgl-sl::before{transform:translateX(20px)}
.tlbl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:var(--font-body),sans-serif}
.btn-edt{background:none;border:1px solid rgba(200,170,106,.3);color:var(--gold);padding:5px 11px;font-size:10px;letter-spacing:1.5px;cursor:pointer;border-radius:4px;text-transform:uppercase;font-family:var(--font-body),sans-serif}
.btn-del{background:none;border:1px solid rgba(220,60,60,.3);color:#e06060;padding:5px 11px;font-size:10px;letter-spacing:1.5px;cursor:pointer;border-radius:4px;text-transform:uppercase;font-family:var(--font-body),sans-serif}
.btn-add{width:100%;background:rgba(200,170,106,.08);border:1px dashed rgba(200,170,106,.35);color:var(--gold);padding:13px;font-size:12px;letter-spacing:2px;cursor:pointer;border-radius:11px;text-transform:uppercase;margin-top:4px;font-family:var(--font-body),sans-serif;display:block}
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:400;align-items:flex-end}
.modal-wrap.on{display:flex}
.modal-box{background:#1e1008;width:100%;max-width:480px;margin:0 auto;border-radius:18px 18px 0 0;padding:22px 16px 38px;max-height:88vh;overflow-y:auto}
.modal-ttl{font-size:15px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid rgba(200,170,106,.18)}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:10px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;font-family:var(--font-body),sans-serif}
.fld input,.fld textarea{width:100%;background:#110906;border:1px solid rgba(255,255,255,.1);color:var(--cream);padding:9px 11px;font-family:sans-serif;font-size:13px;border-radius:7px;outline:none}
.fld textarea{min-height:70px;resize:vertical;line-height:1.5}
.fld input:focus,.fld textarea:focus{border-color:var(--gold)}
.img-prev{width:100%;height:140px;border-radius:9px;object-fit:cover;margin-top:7px;display:none;border:1px solid rgba(255,255,255,.08)}
.modal-acts{display:flex;gap:9px;margin-top:18px}
.btn-save{flex:1;background:var(--gold);color:#110906;border:none;padding:13px;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;border-radius:9px;text-transform:uppercase;font-family:var(--font-body),sans-serif}
.btn-cancel{flex:1;background:none;color:var(--muted);border:1px solid rgba(255,255,255,.1);padding:13px;font-size:13px;letter-spacing:2px;cursor:pointer;border-radius:9px;text-transform:uppercase;font-family:var(--font-body),sans-serif}
.cata-sec{margin-bottom:13px}
.cata-row{background:#0e0804;border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:9px;margin-bottom:9px}
.cata-row-top{display:flex;gap:7px;align-items:center;margin-bottom:6px}
.cata-l{flex:1;background:#110906;border:1px solid rgba(255,255,255,.1);color:var(--gold);padding:8px 10px;font-family:var(--font-body),sans-serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;border-radius:6px;outline:none}
.cata-l:focus{border-color:var(--gold)}
.cata-v{width:100%;background:#110906;border:1px solid rgba(255,255,255,.1);color:var(--cream);padding:8px 10px;font-family:sans-serif;font-size:12px;line-height:1.5;border-radius:6px;outline:none;min-height:54px;resize:vertical}
.cata-v:focus{border-color:var(--gold)}
.btn-cata-del{flex-shrink:0;width:30px;height:30px;background:none;border:1px solid rgba(220,60,60,.35);color:#e06060;font-size:18px;line-height:1;cursor:pointer;border-radius:6px;font-family:sans-serif}
.btn-cata-add{width:100%;background:rgba(200,170,106,.08);border:1px dashed rgba(200,170,106,.35);color:var(--gold);padding:10px;font-size:11px;letter-spacing:1.5px;cursor:pointer;border-radius:8px;text-transform:uppercase;font-family:var(--font-body),sans-serif}
.cover-edit{padding:14px 12px;border-bottom:1px solid rgba(255,255,255,.06);background:#110906}
.cover-edit-lbl{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;font-family:var(--font-body),sans-serif}
.cover-prev{width:100%;height:120px;object-fit:cover;border-radius:10px;display:block;margin-bottom:9px;border:1px solid rgba(255,255,255,.08)}
.btn-cover{display:block;text-align:center;background:rgba(200,170,106,.08);border:1px dashed rgba(200,170,106,.35);color:var(--gold);padding:11px;font-size:11px;letter-spacing:1.5px;cursor:pointer;border-radius:9px;text-transform:uppercase;font-family:var(--font-body),sans-serif}
.cover-hint{font-size:10px;color:var(--muted);margin-top:7px;font-family:sans-serif;text-align:center}
.dsec{margin-bottom:18px}
.dsec-lbl{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:9px;font-family:var(--font-body),sans-serif}
.font-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.font-card{background:#0e0804;border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:10px 8px;text-align:center;cursor:pointer}
.font-card.on{border-color:var(--gold);background:rgba(200,170,106,.1)}
.font-card .fc-name{font-size:18px;color:var(--cream);line-height:1.2}
.font-card .fc-lbl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-family:sans-serif}
.pal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pal-card{border-radius:9px;padding:10px 4px;text-align:center;cursor:pointer;border:2px solid transparent}
.pal-card.on{border-color:var(--gold)}
.pal-dot{width:26px;height:26px;border-radius:50%;margin:0 auto 6px;border:1px solid rgba(255,255,255,.15)}
.pal-card .pc-lbl{font-size:9px;color:var(--cream);text-transform:uppercase;letter-spacing:.5px;font-family:sans-serif}
.dsec input[type=range]{width:100%}
.txt-edit{margin-bottom:13px}
.txt-edit .ct-cat{font-size:10.5px;font-weight:700;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;margin-bottom:5px;font-family:var(--font-body),sans-serif}
.logo-prev{max-width:200px;max-height:80px;object-fit:contain;display:none;margin:0 auto 9px;background:var(--top);padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.08)}
.brand-logo-img{height:38px;max-width:220px;object-fit:contain;display:block;margin:0 auto;cursor:pointer}
</style>
</head>
<body>

<header class="hdr">
  <div class="brand" id="brandEl">DC BEER</div>
  <div class="brand-sub">Cerveceria Artesanal</div>
</header>

<div id="mainLoading" class="loading">
  <div class="loading-spin"></div>
  CARGANDO MENU...
</div>

<div class="sec on" id="sec-barril"></div>
<div class="sec"    id="sec-importadas"></div>
<div class="sec"    id="sec-nacionales"></div>
<div class="sec"    id="sec-snacks"></div>

<nav class="tabbar" id="tabbar" style="display:none">
  <button class="tbtn on" id="tb-barril"     onclick="goSec('barril')">BARRIL</button>
  <button class="tbtn"    id="tb-importadas" onclick="goSec('importadas')">IMPORTADAS</button>
  <button class="tbtn"    id="tb-nacionales" onclick="goSec('nacionales')">NACIONAL</button>
  <button class="tbtn"    id="tb-snacks"     onclick="goSec('snacks')">SNACKS</button>
</nav>

<div class="pin-wrap" id="pinWrap">
  <div class="pin-box">
    <div class="pin-title">Admin</div>
    <div class="pin-hint">Ingresa la clave de acceso</div>
    <input type="password" id="pinInput" class="pin-input" placeholder="Clave" autocomplete="off" onkeydown="if(event.key==='Enter'){checkPinInput();}">
    <button class="btn-cover" style="display:block;margin-top:14px" onclick="checkPinInput()">Entrar</button>
    <button class="key" style="margin-top:9px;width:100%;font-size:11px;color:var(--muted);padding:9px" onclick="cerrarPin()">ESC</button>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<div class="adm-wrap" id="admWrap">
  <div class="adm-top">
    <div class="adm-title">Admin DC BEER</div>
    <button class="adm-cls" onclick="closeAdm()">CERRAR</button>
  </div>
  <div class="cover-edit">
    <div class="cover-edit-lbl">Imagen de portada</div>
    <img id="coverPrev" class="cover-prev" src="" alt="portada">
    <label class="btn-cover">Cambiar imagen
      <input type="file" id="coverInput" accept="image/*" style="display:none">
    </label>
    <div class="cover-hint">Se aplica a Barril, Importadas y Snacks.</div>
  </div>
  <div class="adm-tabs">
    <button class="atab on" id="at-barril"     onclick="admTab('barril')">BARRIL</button>
    <button class="atab"    id="at-importadas" onclick="admTab('importadas')">IMPORT.</button>
    <button class="atab"    id="at-nacionales" onclick="admTab('nacionales')">NACIONAL</button>
    <button class="atab"    id="at-snacks"     onclick="admTab('snacks')">SNACKS</button>
    <button class="atab"    id="at-diseno"     onclick="admTab('diseno')">DISEÑO</button>
  </div>
  <div id="saving-msg" class="saving" style="display:none">GUARDANDO EN LA NUBE...</div>
  <div class="asec on" id="as-barril"></div>
  <div class="asec"    id="as-importadas"></div>
  <div class="asec"    id="as-nacionales"></div>
  <div class="asec"    id="as-snacks"></div>
  <div class="asec"    id="as-diseno"></div>
</div>

<div class="modal-wrap" id="modalWrap">
  <div class="modal-box">
    <div class="modal-ttl" id="modalTtl">Agregar Producto</div>
    <div class="fld"><label>Nombre</label><input type="text" id="fNombre" placeholder="Ej: DC IPA"></div>
    <div class="fld" id="wImg">
      <label>Foto del producto</label>
      <img id="prodImgPrev" class="img-prev" src="" alt="producto">
      <label class="btn-cover" style="margin-top:7px;display:block">Cambiar foto
        <input type="file" id="prodImgInput" accept="image/*" style="display:none">
      </label>
    </div>
    <div class="fld" id="wEstilo"><label>Estilo</label><input type="text" id="fEstilo" placeholder="Ej: American IPA"></div>

/* ===== FIREBASE REST API ===== */
function fbGet(cb) {
  fetch(FB + ".json")
    .then(function(r) { return r.json(); })
    .then(function(d) { cb(null, d); })
    .catch(function(e) { cb(e, null); });
}

function fbSet(data, cb) {
  var toSave = {barril:[], importadas:[], nacionales:[], snacks:[]};
  if (data.cover) { toSave.cover = data.cover; }
  if (data.design) { toSave.design = data.design; }
  if (data.titulos) { toSave.titulos = data.titulos; }
  if (data.pin) { toSave.pin = data.pin; }
  ["barril","importadas","nacionales","snacks"].forEach(function(cat) {
    data[cat].forEach(function(p) {
      var obj = {};
      var keys = Object.keys(p);
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        obj[k] = p[k];
      }
      toSave[cat].push(obj);
    });
  });
  fetch(FB + ".json", {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(toSave)
  })
  .then(function(r) { return r.json(); })
  .then(function() { if (cb) cb(null); })
  .catch(function(e) { if (cb) cb(e); });
}

function init() {
  fbGet(function(err, d) {
    var fresh = false;
    if (err || !d) {
      // Firebase vacio o error - usar defaults
      datos = JSON.parse(JSON.stringify(DEFAULT));
      fresh = true;
    } else {
      datos = d;
      if (!datos.barril) { datos.barril = []; }
      if (!datos.importadas) { datos.importadas = []; }
      if (!datos.nacionales) { datos.nacionales = []; }
      if (!datos.snacks) { datos.snacks = []; }
      // Restaurar imgKey desde defaults si falta
      ["barril","importadas","nacionales"].forEach(function(cat) {
        var def = DEFAULT[cat];
        datos[cat].forEach(function(p, i) {
          if (!p.imgKey && def[i]) { p.imgKey = def[i].imgKey; }
        });
      });
    }
    // Normalizar/migrar notas de cata de todas las cervezas
    ["barril","importadas","nacionales"].forEach(function(cat) {
      datos[cat].forEach(function(p) { ensureCata(p); });
    });
    ensureDesign();
    applyDesign();
    if (fresh) { fbSet(datos, null); }
    document.getElementById("mainLoading").style.display = "none";
    document.getElementById("tabbar").style.display = "flex";
    renderMenu();
  });
}

function getImg(p) {
  if (p.imgKey && IMG[p.imgKey]) { return IMG[p.imgKey]; }

}

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/"/g, "&quot;");
}

// Convierte el HTML viejo de cata en una lista editable {l:titulo, v:texto}
function parseCataHTML(html) {
  var d = document.createElement("div");
  d.innerHTML = html;
  var lbls = d.querySelectorAll(".ct-lbl");
  var vals = d.querySelectorAll(".ct-val");
  var out = [];
  for (var i = 0; i < lbls.length; i++) {
    out.push({ l: lbls[i].textContent.trim(), v: vals[i] ? vals[i].textContent.trim() : "" });
  }
  return out;
}

// Garantiza que cada producto tenga su cata como lista editable
function ensureCata(p) {
  if (!Array.isArray(p.cata)) {
    if (p.cataKey && CATA[p.cataKey]) {
      p.cata = parseCataHTML(CATA[p.cataKey]);
    } else {
      p.cata = [];
    }
  }
  if ("cataKey" in p) { delete p.cataKey; }
}

// Plantilla de notas para un producto nuevo
function defaultCataTemplate() {
  return [
    { l: "Apariencia", v: "" },
    { l: "Aroma",      v: "" },
    { l: "Sabor",      v: "" },
    { l: "Cuerpo",     v: "" },
    { l: "Final",      v: "" }
  ];
}

function getCata(p) {
  var arr = Array.isArray(p.cata) ? p.cata : [];
  var valid = arr.filter(function(n) {
    return (n.l && n.l.trim()) || (n.v && n.v.trim());
  });
  if (valid.length === 0) { return ""; }
  var h = '<p class="ct-ttl">Notas de Cata</p>';
  valid.forEach(function(n, i) {
    if (i > 0) { h += '<hr class="ct-hr">'; }
    h += '<p class="ct-lbl">' + escapeHtml(n.l) + '</p>'
      +  '<p class="ct-val">' + escapeHtml(n.v) + '</p>';
  });
  return h;
}

// Sube, redimensiona y comprime la nueva portada, luego la guarda
function processCover(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var maxW = 1080;
      var scale = Math.min(1, maxW / img.width);
      var w = Math.round(img.width * scale);
      var h = Math.round(img.height * scale);
      var canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      var dataUrl = canvas.toDataURL("image/jpeg", 0.82);
      datos.cover = dataUrl;
      document.getElementById("coverPrev").src = dataUrl;
      saveToFirebase();
    };
    img.onerror = function() { alert("No se pudo leer la imagen. Intenta con otra."); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Sube el logo (PNG, conserva transparencia) y lo guarda en el diseno
function handleLogoFile(inputEl) {
  var file = inputEl.files && inputEl.files[0];
  if (!file) { return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var maxW = 400, maxH = 160;
      var scale = Math.min(1, maxW / img.width, maxH / img.height);
      var w = Math.round(img.width * scale);
      var h = Math.round(img.height * scale);
      var canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      datos.design.logo = canvas.toDataURL("image/png");
      renderBrand();
      saveToFirebase();
      renderDesign();
    };
    img.onerror = function() { alert("No se pudo leer la imagen. Intenta con otra."); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  inputEl.value = "";
}

function quitarLogo() {
  delete datos.design.logo;
  renderBrand();
  saveToFirebase();
  renderDesign();
}

function setFontCombo(key) {
  datos.design.fontKey = key;
  applyDesign();
  saveToFirebase();
  renderDesign();
}

function setPaleta(key) {
  datos.design.palette = key;
  applyDesign();
  saveToFirebase();
  renderDesign();
}

function setHeroSize(val, persist) {
  datos.design.heroSize = parseInt(val, 10);
  applyDesign();
  if (persist) { saveToFirebase(); }
}

function setSubtitleScale(val, persist) {
  datos.design.subtitleScale = parseFloat(val);
  applyDesign();
  if (persist) { saveToFirebase(); }
}

function setDescScale(val, persist) {
  datos.design.descScale = parseFloat(val);
  applyDesign();
  if (persist) { saveToFirebase(); }
}

function saveTitulo(cat) {
  var t = document.getElementById("ttl-" + cat).value.trim();
  var s = document.getElementById("sub-" + cat).value.trim();
  if (!datos.titulos) { datos.titulos = {}; }
  datos.titulos[cat] = { t: t, s: s };
  saveToFirebase();
}

/* ===== MODAL ===== */
function abrirNuevo(cat) {
  editCat = cat; editIdx = null;
  modalImgData = null; modalImgChanged = false;
  document.getElementById("modalTtl").textContent = "Agregar Producto";
  limpiarForm();
  mostrarCampos(cat);
  document.getElementById("prodImgPrev").style.display = "none";
  document.getElementById("prodImgPrev").src = "";
  if (cat !== "snacks") { renderCataRows(defaultCataTemplate()); }
  document.getElementById("modalWrap").classList.add("on");
}

function abrirEdicion(cat, i) {
  editCat = cat; editIdx = i;
  var p = datos[cat][i];
  modalImgData = p.imgData || null; modalImgChanged = false;
  document.getElementById("modalTtl").textContent = "Editar: " + p.nm;
  document.getElementById("fNombre").value = p.nm  || "";
  document.getElementById("fEstilo").value = p.st  || "";
  document.getElementById("fAbv").value    = p.ab  || "";
  document.getElementById("fIbu").value    = p.ib  || "";
  document.getElementById("fSizes").value  = p.sz  || "";
  document.getElementById("fPrecio").value = p.pr  || "";
  document.getElementById("fDesc").value   = p.ds  || "";
  document.getElementById("fDescGen").value = p.dg || "";
  var prev = document.getElementById("prodImgPrev");
  var curImg = (cat === "snacks") ? (p.imgData || "") : getImg(p);
  if (curImg) { prev.src = curImg; prev.style.display = "block"; }
  else { prev.src = ""; prev.style.display = "none"; }
  if (cat !== "snacks") { renderCataRows(p.cata || []); } else { renderCataRows([]); }
  mostrarCampos(cat);
  document.getElementById("modalWrap").classList.add("on");
}

// Sube, redimensiona y comprime la foto del producto (se guarda al dar GUARDAR)
function processProductImg(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var maxW = 500;
      var scale = Math.min(1, maxW / img.width);
      var w = Math.round(img.width * scale);
      var h = Math.round(img.height * scale);
      var canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      modalImgData = canvas.toDataURL("image/jpeg", 0.8);
      modalImgChanged = true;
      var prev = document.getElementById("prodImgPrev");
      prev.src = modalImgData;
      prev.style.display = "block";
    };
    img.onerror = function() { alert("No se pudo leer la imagen. Intenta con otra."); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function limpiarForm() {
  ["fNombre","fEstilo","fAbv","fIbu","fSizes","fPrecio","fDesc","fDescGen"].forEach(function(id) {
    document.getElementById(id).value = "";
  });
  document.getElementById("cataRows").innerHTML = "";
}

function mostrarCampos(cat) {
  var esSnack = (cat === "snacks");
  var showExtra = (cat === "barril" || cat === "importadas");
  ["wEstilo","wAbv","wIbu","wSizes"].forEach(function(id) {
    document.getElementById(id).style.display = esSnack ? "none" : "block";
  });
  document.getElementById("wCata").style.display = (!esSnack && showExtra) ? "block" : "none";
  document.getElementById("wDesc").style.display = esSnack ? "block" : "none";
  document.getElementById("wDescGen").style.display = showExtra ? "block" : "none";
}

function closeModal() { document.getElementById("modalWrap").classList.remove("on"); }

function guardarProducto() {
  var nm = document.getElementById("fNombre").value.trim();
  if (!nm) { alert("El nombre es obligatorio"); return; }
  var esSnack = (editCat === "snacks");
  var showExtra = (editCat === "barril" || editCat === "importadas");
  var pr = document.getElementById("fPrecio").value.trim();

  if (editIdx === null) {
    var obj = {nm:nm, pr:pr, av:true};
    if (modalImgData) { obj.imgData = modalImgData; }
    if (esSnack) {
      obj.ds = document.getElementById("fDesc").value.trim();
    } else {
      obj.st = document.getElementById("fEstilo").value.trim();
      obj.ab = document.getElementById("fAbv").value.trim();
      obj.ib = document.getElementById("fIbu").value.trim();
      obj.sz = document.getElementById("fSizes").value.trim();
      if (showExtra) {
        obj.cata = readCataRows();
        obj.dg = document.getElementById("fDescGen").value.trim();
      }
    }
    datos[editCat].push(obj);
  } else {
    var p = datos[editCat][editIdx];
    p.nm = nm; p.pr = pr;
    if (modalImgChanged) { p.imgData = modalImgData; delete p.imgKey; }
    if (esSnack) {
      p.ds = document.getElementById("fDesc").value.trim();
    } else {
      p.st = document.getElementById("fEstilo").value.trim();
      p.ab = document.getElementById("fAbv").value.trim();
      p.ib = document.getElementById("fIbu").value.trim();
      p.sz = document.getElementById("fSizes").value.trim();
      if (showExtra) {
        p.cata = readCataRows();
        p.dg = document.getElementById("fDescGen").value.trim();
      }
    }
  }

  saveToFirebase();
  closeModal();
  renderAdmin();
}

  if (this.files && this.files[0]) { processCover(this.files[0]); }
  this.value = "";
});
document.getElementById("prodImgInput").addEventListener("change", function() {
  if (this.files && this.files[0]) { processProductImg(this.files[0]); }
  this.value = "";
});
init();
